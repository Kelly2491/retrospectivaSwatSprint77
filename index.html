<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrospectiva SWAT Sprint 77</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container {
max-width:1200px;
margin:auto;
padding:20px;
}

.header {
background:linear-gradient(135deg,#1e3a8a,#7e22ce,#dc2626);
padding:30px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.card {
background:#1e293b;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

input,select,textarea {
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

textarea {
min-height:120px;
}

button {
padding:12px 20px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.board {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.post {
background:#334155;
padding:16px;
border-radius:14px;
}

.hero {
color:#facc15;
font-size:20px;
}

.stage {
color:#93c5fd;
font-size:14px;
}

.vote {
background:#60a5fa;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🦸‍♂️ La Liga del Sprint</h1>
<h2>SWAT Sprint 77 — Misión Rescate</h2>
<p>Modo Multiplayer en tiempo real 🚀</p>
</div>

<div class="card">
<input id="name" placeholder="Tu nombre">

<select id="hero">
<option value="">Selecciona tu héroe</option>
<option>⚡ Flash</option>
<option>🧠 Batman</option>
<option>🛡️ Capitán América</option>
<option>🔥 Iron Man</option>
<option>🕷️ Spider-Man</option>
<option>🟢 Hulk</option>
<option>🧙 Doctor Strange</option>
<option>🦸 Wonder Woman</option>
</select>

<select id="stage">
<option>🗺️ El Mapa de la Ciudad</option>
<option>💥 Los Villanos del Sprint</option>
<option>🛠️ Los Superpoderes</option>
<option>🚨 La Grieta Multiversal</option>
<option>🧪 Laboratorio de Mejoras</option>
</select>

<textarea id="message" placeholder="Escribe tu aporte..."></textarea>

<button onclick="sendMessage()">🚀 Enviar aporte</button>
</div>

<div class="card">
<h2>📌 Respuestas en vivo</h2>
<div id="board" class="board"></div>
</div>

</div>

<script>


const firebaseConfig = {
  apiKey: "AIzaSyBnTfI43qPiwjnqkWLyem6HOuuQbfqy6Q",
  authDomain: "retrospectiva-f9d93.firebaseapp.com",
  databaseURL: "https://retrospectiva-f9d93-default-rtdb.firebaseio.com",
  projectId: "retrospectiva-f9d93",
  storageBucket: "retrospectiva-f9d93.firebasestorage.app",
  messagingSenderId: "975454252660",
  appId: "1:975454252660:web:ab005958ef781949f16b21",
  measurementId: "G-DYV03BMQH4"
};


firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("retroSprint77");

db.on("value", (snapshot) => {
const data = snapshot.val() || {};

const board = document.getElementById("board");
board.innerHTML = "";

Object.entries(data).reverse().forEach(([id,item]) => {

const div = document.createElement("div");
div.className = "post";

div.innerHTML = `
<div class="hero">${item.hero}</div>
<strong>${item.name}</strong>
<div class="stage">${item.stage}</div>
<p>${item.message}</p>
<button class="vote" onclick="vote('${id}', ${item.votes || 0})">
🏆 Votar (${item.votes || 0})
</button>
`;

board.appendChild(div);

});
});

function sendMessage() {

const name = document.getElementById("name").value;
const hero = document.getElementById("hero").value;
const stage = document.getElementById("stage").value;
const message = document.getElementById("message").value;

if(!name || !hero || !message) {
alert("Completa todos los campos");
return;
}

db.push({
name,
hero,
stage,
message,
votes:0
});

document.getElementById("message").value = "";

}

function vote(id,currentVotes) {
firebase.database().ref("retroSprint77/"+id).update({
votes: currentVotes + 1
});
}

</script>

</body>
</html>
