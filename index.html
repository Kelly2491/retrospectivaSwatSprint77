<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrospectiva SWAT Sprint 77</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 1250px;
  margin: auto;
  padding: 20px;
}

.header {
  background: linear-gradient(135deg,#1e3a8a,#7e22ce,#dc2626);
  padding: 35px;
  border-radius: 22px;
  text-align: center;
  margin-bottom: 24px;
}

.header h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.card {
  background: #1e293b;
  padding: 22px;
  border-radius: 18px;
  margin-bottom: 22px;
}

input, select, textarea {
  width: 100%;
  padding: 13px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

textarea {
  min-height: 130px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #facc15;
  font-weight: bold;
  cursor: pointer;
  margin-top: 12px;
}

.stage-section {
  background: #1e293b;
  padding: 24px;
  border-radius: 20px;
  margin-bottom: 26px;
  border: 1px solid #334155;
}

.stage-title {
  font-size: 26px;
  margin-bottom: 8px;
  color: #facc15;
}

.stage-question {
  color: #cbd5e1;
  margin-bottom: 18px;
}

.stage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}

.post {
  background: #334155;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid #475569;
}

.hero {
  color: #facc15;
  font-size: 22px;
  font-weight: bold;
}

.name {
  font-weight: bold;
  margin-top: 6px;
}

.message {
  margin-top: 14px;
  line-height: 1.4;
}

.vote {
  background: #60a5fa;
  margin-top: 14px;
}

.empty {
  color: #94a3b8;
  font-style: italic;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.clear {
  background: #fb7185;
}

@media(max-width: 700px) {
  .header h1 {
    font-size: 28px;
  }

  .container {
    padding: 12px;
  }

  .stage-title {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🦸‍♂️ La Liga del Sprint</h1>
    <h2>SWAT Sprint 77 — Misión Rescate</h2>
    <p>Modo multiplayer en tiempo real 🚀</p>
  </div>

  <div class="card">
    <input id="name" placeholder="Tu nombre">

    <select id="hero">
      <option value="">Selecciona tu héroe</option>
      <option>⚡ Flash</option>
      <option>🧠 Batman</option>
      <option>🛡️ Capitán América</option>
      <option>🔥 Iron Man</option>
      <option>🕷️ Spider-Man</option>
      <option>🟢 Hulk</option>
      <option>🧙 Doctor Strange</option>
      <option>🦸 Wonder Woman</option>
    </select>

    <select id="stage">
      <option value="mapa">🗺️ El Mapa de la Ciudad</option>
      <option value="villanos">💥 Los Villanos del Sprint</option>
      <option value="superpoderes">🛠️ Los Superpoderes</option>
      <option value="grieta">🚨 La Grieta Multiversal</option>
      <option value="laboratorio">🧪 Laboratorio de Mejoras</option>
    </select>

    <textarea id="message" placeholder="Escribe tu aporte..."></textarea>

    <div class="top-actions">
      <button onclick="sendMessage()">🚀 Enviar aporte</button>
      <button class="clear" onclick="clearAll()">🧹 Limpiar tablero</button>
    </div>
  </div>

  <div class="card">
    <h2>📌 Respuestas en vivo por etapa</h2>
    <p>Las respuestas se organizan automáticamente según la etapa seleccionada.</p>
  </div>

  <div id="board"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnTfI43qPiwjnqkWLyem6HOuuQbfqy6Q",
  authDomain: "retrospectiva-f9d93.firebaseapp.com",
  databaseURL: "https://retrospectiva-f9d93-default-rtdb.firebaseio.com",
  projectId: "retrospectiva-f9d93",
  storageBucket: "retrospectiva-f9d93.firebasestorage.app",
  messagingSenderId: "975454252660",
  appId: "1:975454252660:web:ab005958ef781949f16b21",
  measurementId: "G-DYV03BMQH4"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("retroSprint77");

const stages = [
  {
    id: "mapa",
    title: "🗺️ El Mapa de la Ciudad",
    question: "¿Qué partes de la ciudad logramos salvar?"
  },
  {
    id: "villanos",
    title: "💥 Los Villanos del Sprint",
    question: "¿Qué enemigos atacaron la misión?"
  },
  {
    id: "superpoderes",
    title: "🛠️ Los Superpoderes",
    question: "¿Qué poderes usamos para sobrevivir?"
  },
  {
    id: "grieta",
    title: "🚨 La Grieta Multiversal",
    question: "¿Qué casi destruye la misión?"
  },
  {
    id: "laboratorio",
    title: "🧪 Laboratorio de Mejoras",
    question: "¿Qué gadgets necesitamos para el próximo sprint?"
  }
];

db.on("value", (snapshot) => {
  const data = snapshot.val() || {};
  renderBoard(data);
});

function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const hero = document.getElementById("hero").value;
  const stage = document.getElementById("stage").value;
  const message = document.getElementById("message").value.trim();

  if (!name || !hero || !message) {
    alert("Completa nombre, héroe y aporte.");
    return;
  }

  db.push({
    name,
    hero,
    stage,
    message,
    votes: 0,
    createdAt: Date.now()
  });

  document.getElementById("message").value = "";
}

function vote(id, currentVotes) {
  firebase.database().ref("retroSprint77/" + id).update({
    votes: currentVotes + 1
  });
}

function renderBoard(data) {
  const board = document.getElementById("board");
  board.innerHTML = "";

  stages.forEach(stage => {
    const section = document.createElement("section");
    section.className = "stage-section";

    const items = Object.entries(data)
      .filter(([id, item]) => item.stage === stage.id || item.stage === stage.title)
      .sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));

    section.innerHTML = `
      <div class="stage-title">${stage.title}</div>
      <div class="stage-question">${stage.question}</div>
    `;

    if (items.length === 0) {
      section.innerHTML += `<p class="empty">Aún no hay aportes en esta etapa.</p>`;
    } else {
      const grid = document.createElement("div");
      grid.className = "stage-grid";

      items.forEach(([id, item]) => {
        const post = document.createElement("div");
        post.className = "post";

        post.innerHTML = `
          <div class="hero">${item.hero}</div>
          <div class="name">${item.name}</div>
          <div class="message">${item.message}</div>
          <button class="vote" onclick="vote('${id}', ${item.votes || 0})">
            🏆 Votar (${item.votes || 0})
          </button>
        `;

        grid.appendChild(post);
      });

      section.appendChild(grid);
    }

    board.appendChild(section);
  });
}

function clearAll() {
  const ok = confirm("¿Seguro que deseas borrar todos los aportes?");
  if (ok) {
    db.remove();
  }
}
</script>

</body>
</html>
