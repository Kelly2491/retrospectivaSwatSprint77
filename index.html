<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Liga del Sprint — Misión Rescate</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #263b73, #101827 55%, #050816);
      color: white;
    }

    .app {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .hero-header {
      text-align: center;
      background: linear-gradient(135deg, #1f3b73, #7b1fa2, #dc2626);
      padding: 32px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    .hero-header h1 {
      font-size: 42px;
      margin: 0;
    }

    .hero-header h2 {
      margin: 8px 0;
      color: #facc15;
    }

    .panel, .mission-card, .stage-section, footer {
      background: rgba(31, 41, 55, .92);
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,.12);
    }

    .panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      margin-top: 12px;
    }

    button {
      background: #facc15;
      color: #111827;
      border: none;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px 6px 0 0;
      transition: .2s;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .secondary {
      background: #60a5fa;
    }

    .danger {
      background: #fb7185;
    }

    .stage-counter {
      color: #93c5fd;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      background: #243244;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #374151;
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
    }

    .card h4 {
      margin: 0 0 8px;
      color: #facc15;
    }

    .card small {
      display: block;
      color: #93c5fd;
      margin-bottom: 8px;
    }

    .empty {
      color: #cbd5e1;
      font-style: italic;
    }

    .awards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .award {
      background: #111827;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(250, 204, 21, .35);
    }

    footer {
      text-align: center;
    }

    @media (max-width: 700px) {
      .panel { grid-template-columns: 1fr; }
      .hero-header h1 { font-size: 32px; }
      .app { padding: 14px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const heroes = [
      "⚡ Flash",
      "🧠 Batman",
      "🛡️ Capitán América",
      "🔥 Iron Man",
      "🕷️ Spider-Man",
      "🟢 Hulk",
      "🧙 Doctor Strange",
      "🦸 Wonder Woman"
    ];

    const stages = [
      {
        title: "🗺️ El Mapa de la Ciudad",
        question: "¿Qué partes de la ciudad logramos salvar?",
        placeholder: "Ej: Se logró desplegar Push Notifications / El equipo reaccionó rápido ante soporte."
      },
      {
        title: "💥 Los Villanos del Sprint",
        question: "¿Qué enemigos atacaron la misión?",
        placeholder: "Ej: Scope Creeper apareció a mitad del sprint / Doctor Dependencia bloqueó el avance."
      },
      {
        title: "🛠️ Los Superpoderes",
        question: "¿Qué poderes usamos para sobrevivir?",
        placeholder: "Ej: Mi superpoder fue apoyar al equipo, desbloquear rápido o proponer soluciones."
      },
      {
        title: "🚨 La Grieta Multiversal",
        question: "¿Qué casi destruye la misión?",
        placeholder: "Ej: Sobrecarga, falta de claridad, tensiones, urgencias o dependencias."
      },
      {
        title: "🧪 Laboratorio de Mejoras",
        question: "¿Qué gadgets necesitamos para el próximo sprint?",
        placeholder: "Ej: Radar de prioridades para evitar cambios tardíos / Escudo Anti-Bugs para mejorar pruebas."
      }
    ];

    function App() {
      const [player, setPlayer] = React.useState("");
      const [hero, setHero] = React.useState("");
      const [currentStage, setCurrentStage] = React.useState(0);
      const [cards, setCards] = React.useState([]);
      const [text, setText] = React.useState("");
      const [votes, setVotes] = React.useState({});

      const stage = stages[currentStage];

      const addCard = () => {
        if (!player.trim() || !hero || !text.trim()) {
          alert("Completa tu nombre, selecciona un héroe y escribe tu aporte.");
          return;
        }

        setCards([
          ...cards,
          {
            id: Date.now(),
            player,
            hero,
            stage: stage.title,
            text
          }
        ]);

        setText("");
      };

      const vote = (id) => {
        setVotes({
          ...votes,
          [id]: (votes[id] || 0) + 1
        });
      };

      const resetGame = () => {
        const ok = confirm("¿Seguro que deseas reiniciar toda la misión?");
        if (ok) {
          setCards([]);
          setVotes({});
          setText("");
          setCurrentStage(0);
        }
      };

      const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);

      return (
        <div className="app">
          <header className="hero-header">
            <h1>🦸‍♂️ La Liga del Sprint</h1>
            <h2>Misión Rescate</h2>
            <p>
              La ciudad tecnológica estuvo en peligro durante el sprint.
              Ahora la liga debe reflexionar, aprender y preparar la próxima misión.
            </p>
          </header>

          <section className="panel">
            <input
              type="text"
              placeholder="Escribe tu nombre"
              value={player}
              onChange={(e) => setPlayer(e.target.value)}
            />

            <select value={hero} onChange={(e) => setHero(e.target.value)}>
              <option value="">Selecciona tu superhéroe</option>
              {heroes.map((h) => (
                <option key={h} value={h}>{h}</option>
              ))}
            </select>
          </section>

          <main className="mission-card">
            <div className="stage-counter">
              Etapa {currentStage + 1} de {stages.length}
            </div>

            <h2>{stage.title}</h2>
            <h3>{stage.question}</h3>

            <textarea
              placeholder={stage.placeholder}
              value={text}
              onChange={(e) => setText(e.target.value)}
            />

            <button onClick={addCard}>➕ Agregar aporte</button>

            <div className="navigation">
              <button
                className="secondary"
                onClick={() => setCurrentStage(Math.max(currentStage - 1, 0))}
                disabled={currentStage === 0}
              >
                ⬅ Anterior
              </button>

              <button
                className="secondary"
                onClick={() => setCurrentStage(Math.min(currentStage + 1, stages.length - 1))}
                disabled={currentStage === stages.length - 1}
              >
                Siguiente ➡
              </button>
            </div>
          </main>

          <section>
            <h2>📌 Tablero de la Misión</h2>

            {stages.map((s) => {
              const stageCards = cards.filter((card) => card.stage === s.title);

              return (
                <div key={s.title} className="stage-section">
                  <h3>{s.title}</h3>

                  {stageCards.length === 0 && (
                    <p className="empty">Aún no hay aportes en esta etapa.</p>
                  )}

                  <div className="cards">
                    {stageCards.map((card) => (
                      <div key={card.id} className="card">
                        <h4>{card.hero}</h4>
                        <small>{card.player}</small>
                        <p>{card.text}</p>
                        <button onClick={() => vote(card.id)}>
                          🏆 Votar ({votes[card.id] || 0})
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </section>

          <section className="stage-section">
            <h2>🎖️ Premiaciones divertidas</h2>
            <div className="awards">
              <div className="award">🦸 Héroe del Sprint</div>
              <div className="award">🚑 Mejor salvada</div>
              <div className="award">⚡ Mayor desbloqueador</div>
              <div className="award">🧠 Mejor idea</div>
              <div className="award">🔥 MVP del sprint</div>
              <div className="award">😂 Momento más épico</div>
            </div>
            <p>Total de votos realizados: <strong>{totalVotes}</strong></p>
          </section>

          <footer>
            <h2>🌟 Cierre de la misión</h2>
            <p>
              “Un héroe no trabaja solo. La verdadera fuerza de la misión estuvo en el equipo.”
            </p>
            <button className="danger" onClick={resetGame}>Reiniciar misión</button>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
